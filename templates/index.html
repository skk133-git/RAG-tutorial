<!DOCTYPE html>
<html>
<head>
    <title>RAG Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }
        .chat-container {
            width: 600px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        .message {
            margin: 10px 0;
        }
        .user {
            font-weight: bold;
        }
        .bot {
            margin-left: 10px;
        }
        input {
            width: 80%;
            padding: 10px;
        }
        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>RAG Chatbot</h2>
    <div id="chat"></div>

    <input id="input" placeholder="Ask a question..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const message = input.value;
    if (!message) return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `<div class="message user">You: ${message}</div>`;
    input.value = "";

    const response = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    const data = await response.json();
    chat.innerHTML += `<div class="message bot">Bot: ${data.answer}</div>`;
}
</script>

</body>
</html>
